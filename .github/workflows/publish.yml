# n8n requires nodes submitted for verification to be published from GitHub Actions
# with an npm provenance statement. Configure this repository as a Trusted Publisher
# on npmjs.com, then push a version tag to release.
name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      # "write" so the packed tarball can be attached to the GitHub release,
      # which is what lets people install straight from github.com/p17-gmbh.
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Release
        run: |
          [ -n "$NPM_TOKEN" ] && npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publishes the same artefact on the GitHub side, so the package can be
      # downloaded and installed without touching npm at all.
      - name: Attach the tarball to the GitHub release
        run: |
          npm pack
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" ./*.tgz --clobber
          else
            gh release create "$GITHUB_REF_NAME" ./*.tgz \
              --title "$GITHUB_REF_NAME" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
