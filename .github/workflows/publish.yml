# n8n requires nodes submitted for verification to be published from GitHub Actions
# with an npm provenance statement. Provenance needs no Trusted Publisher setup — an
# NPM_TOKEN repository secret is enough, as long as this job keeps "id-token: write",
# runs on a GitHub-hosted runner, and package.json carries a public "repository" URL
# that matches this repository exactly (the comparison is case-sensitive).
#
# Trusted Publishing is the token-free alternative, but it is configured per package
# on npmjs.com and therefore only available once the package has been published once.
#
# Release by pushing a version tag, which "npm run release" does for you.
name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      # "write" so the packed tarball can be attached to the GitHub release,
      # which is what lets people install straight from github.com/p17-gmbh.
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 'lts/*'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Release
        # Steps run under "bash -e", so a bare "[ -n ... ] && ..." would abort the whole
        # step when the secret is unset instead of falling through to Trusted Publishing.
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          else
            echo "No NPM_TOKEN set — relying on Trusted Publishing."
          fi
          npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publishes the same artefact on the GitHub side, so the package can be
      # downloaded and installed without touching npm at all.
      - name: Attach the tarball to the GitHub release
        run: |
          npm pack
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" ./*.tgz --clobber
          else
            gh release create "$GITHUB_REF_NAME" ./*.tgz \
              --title "$GITHUB_REF_NAME" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
